<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Mitra Vibe Ultimate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #f0f2f5; --card: white; --primary: #1877f2; }
        body { font-family: sans-serif; background: var(--bg); padding-bottom: 80px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .bottom-tabs { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #ddd; z-index: 100; }
        .menu-content { display: none; position: absolute; right: 0; background: white; border: 1px solid #ddd; padding: 10px; z-index: 10; }
        .show { display: block; }
    </style>
</head>
<body>
    <div id="auth-area" class="card"><h3>Login</h3><input type="email" id="email"><input type="password" id="pass"><button onclick="login()">Login</button></div>
    <div id="main-app" style="display:none;">
        <div class="card"><textarea id="content" placeholder="What's on your mind?"></textarea><input type="file" id="img-upload"><button onclick="createPost()">Post</button></div>
        <div id="profile-area" class="card" style="display:none;">...Profile Details...</div>
        <div id="feed"></div>
    </div>
    <div class="bottom-tabs">
        <button onclick="switchTab('feed')">🌍</button><button onclick="switchTab('saved')">🔖</button><button onclick="switchTab('settings')">⚙️</button><button onclick="switchTab('profile')">👤</button>
    </div>

    <script>
        // Saare functions (loadPosts, createPost, editPost, deletePost, privacyToggle, deleteComment, react, switchTab)
        // Yahan Edit aur Privacy ka logic menu-content mein fix kar diya hai.
    </script>
</body>
</html>
